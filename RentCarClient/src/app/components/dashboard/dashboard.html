<div class="container mt-5">
  <h2 class="fw-bold mb-4">📊 Panel de Control - Rent-a-Car Pro</h2>
  
  <div class="row">
    <div class="col-md-6">
      <div class="card shadow-sm border-0 p-4">
        <h5 class="text-center fw-bold text-muted">Estado de las Rentas</h5>
        <canvas baseChart 
          [datasets]="pieChartDatasets" 
          [labels]="pieChartLabels" 
          [options]="pieChartOptions" 
          [legend]="true" 
          type="pie">
        </canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-sm border-0 p-4 h-100 d-flex justify-content-center">
        <h4 class="fw-bold">Resumen de Flota</h4>
        <p class="text-muted">Visualización en tiempo real del desempeño de tus operaciones.</p>
        <div class="alert alert-primary">
          <strong>Total de operaciones:</strong> {{ pieChartDatasets[0].data[0] + pieChartDatasets[0].data[1] }}
        </div>
      </div>
    </div>
  </div>
</div>
